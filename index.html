<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>똑똑한 냉동고 집사</title>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* 헤더 영역 */
    .header { padding: 20px; text-align: center; background: #1f1f1f; border-bottom: 1px solid #333; }
    .status { font-size: 0.9rem; color: #ffcc00; margin-top: 5px; font-weight: bold; }

    /* 채팅 창 영역 */
    #chatContainer { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 1rem; line-height: 1.4; word-break: break-word; }
    .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
    .butler { align-self: flex-start; background: #333; color: #e0e0e0; border-bottom-left-radius: 2px; }

    /* 하단 조작 영역 */
    .controls { padding: 30px; background: #1f1f1f; display: flex; flex-direction: column; align-items: center; gap: 20px; border-top: 1px solid #333; }
    #micBtn { width: 90px; height: 90px; border-radius: 50%; border: none; background: #444; color: white; font-size: 2.5rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; }
    
    /* 마이크가 작동 중일 때의 애니메이션 */
    #micBtn.listening {
      background: #ff4444;
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255, 68, 68, 0.5);
      filter: drop-shadow(0 0 10px #ff0000);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    .naepa-btn { background: #333; border: 1px solid #ffcc00; color: #ffcc00; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    
    /* 초기 시작 버튼 overlay */
    #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    #startBtn { padding: 20px 40px; font-size: 1.2rem; background: #ffcc00; border:none; border-radius: 50px; font-weight:bold; cursor: pointer; }
  </style>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://script.googleusercontent.com">
</head>
<body>

  <div id="overlay">
    <button id="startBtn" onclick="callButler()">집사 부르기</button>
    <p style="color: #888; margin-top: 20px;">터치하면 대화를 시작합니다</p>
  </div>

  <div class="header">
    <div style="font-weight: bold; font-size: 1.2rem;">똑똑한 냉동고 집사</div>
    <div class="status" id="statusLabel">대기 중...</div>
  </div>
  
  <div id="chatContainer"></div>
  
  <div class="controls">
    <button class="naepa-btn" onclick="requestNaepa()">✨ 냉파 제안</button>
    <button id="micBtn" onclick="handleMicClick()">🎤</button>
    <div style="font-size: 0.8rem; color: #666;">마이크를 누르고 말씀하세요</div>
  </div>

<script>
  // ==========================================
  // [설정] 본인의 웹앱 주소 기입
  // ==========================================
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwP5lCFozQRiP7LAHwtkeT104NLzUfPSBwN_v1ZEoOc8hQ2W5lVi97FJ9xVEN79WEoY/exec";
  
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  let isListening = false;
  let finalTranscript = "";      
  let saveTranscript = "";       
  let currentUserBubble = null;

  recognition.lang = 'ko-KR';
  recognition.continuous = true;    
  recognition.interimResults = true;

  function createChatBubble(text, sender) {
    const container = document.getElementById('chatContainer');
    const bubble = document.createElement('div');
    bubble.classList.add('bubble', sender);
    bubble.innerText = text;
    container.appendChild(bubble);
    container.scrollTop = container.scrollHeight;
    return bubble;
  }

  function callButler() {
    document.getElementById('overlay').style.display = 'none';
    updateStatus("집사가 응답하는 중...");
    
    // 💡 TTS(음성 출력)를 비동기로 던져두어 화면 그리기(Main Thread) 랙 방지
    setTimeout(() => {
      const greeting = new SpeechSynthesisUtterance("네, 주인님. 무엇을 도와드릴까요?");
      greeting.lang = "ko-KR";
      greeting.rate = 1.1;
      window.speechSynthesis.speak(greeting);
    }, 0);
    
    startListening(); 
  }

  function startListening() {
    if (isListening) return;
    try {
      finalTranscript = "";
      saveTranscript = "";
      currentUserBubble = null;
      recognition.start();
    } catch (e) {
      console.log("인식 시작 오류:", e);
      recognition.stop();
      setTimeout(() => recognition.start(), 200);
    }
  }

  recognition.onstart = function() {
    isListening = true;
    updateStatus("🎤 듣고 있습니다...");
    document.getElementById('micBtn').classList.add('listening');
  };

  recognition.onresult = function(event) {
    const isAndroid = /Android/i.test(navigator.userAgent);
    let currentResult = "";
    
    if (isAndroid) {
      currentResult = event.results[event.results.length - 1][0].transcript;
    } else {
      let speechToText = "";
      for (let i = 0; i < event.results.length; i++) {
        speechToText += event.results[i][0].transcript;
      }
      currentResult = speechToText;
    }
    
    finalTranscript = currentResult;
    
    if (!currentUserBubble) {
      currentUserBubble = createChatBubble("", 'user');
    }
    currentUserBubble.innerText = saveTranscript + currentResult;
  };

  recognition.onend = function() {
    if (isListening) {
      const isAndroid = /Android/i.test(navigator.userAgent);
      if (isAndroid) {
        if (finalTranscript.trim() !== "") {
          saveTranscript += finalTranscript + " ";
          finalTranscript = "";
        }
        try {
          recognition.start();
        } catch (e) {
          setTimeout(() => { if (isListening) recognition.start(); }, 200);
        }
      }
    }
  };

  function handleMicClick() {
    if (isListening) {
      isListening = false;
      recognition.stop();
      document.getElementById('micBtn').classList.remove('listening');
      
      const totalText = currentUserBubble ? currentUserBubble.innerText : (saveTranscript + finalTranscript);
      
      if (totalText.trim() === "") {
        updateStatus("인식된 내용이 없습니다.");
        if(currentUserBubble) currentUserBubble.remove();
        return;
      }

      updateStatus("⌛ 주인님의 말씀을 생각하는 중...");
      
      // 💡 [v2.5 핵심 가속]: fetch 통신에 redirect="follow" 옵션을 명시하고 렌더링 작업을 병렬 분리
      fetch(GAS_WEB_APP_URL, {
        method: "POST",
        redirect: "follow", 
        body: JSON.stringify({ text: totalText })
      })
      .then(response => response.json())
      .then(data => {
        // 백엔드 답변이 오자마자 즉시 화면을 먼저 그리고, TTS 엔진은 뒤에서 비동기로 띄움 (체감속도 상승)
        responseFromGemini(data.response);
      })
      .catch(err => {
        console.error("통신 오류:", err);
        updateStatus("통신 오류가 발생했습니다.");
      });
    } else {
      startListening();
    }
  }

  function requestNaepa() {
    updateStatus("⌛ 냉파 제안을 생각하는 중...");
    createChatBubble("✨ 냉파 제안해줘", 'user');
    
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      redirect: "follow",
      body: JSON.stringify({ text: "냉파 제안해줘" })
      })
    .then(response => response.json())
    .then(data => {
      responseFromGemini(data.response);
    })
    .catch(err => {
      console.error("통신 오류:", err);
      updateStatus("통신 오류가 발생했습니다.");
    });
  }

  function responseFromGemini(response) {
    updateStatus("집사가 답변을 준비했습니다.");
    createChatBubble(response, 'butler');

    // 음성 출력을 메인 스레드 렌더링(UI)과 분리하여 화면 끊김 방지
    setTimeout(() => {
      const reply = new SpeechSynthesisUtterance(response);
      reply.lang = "ko-KR";
      reply.rate = 1.1;
      window.speechSynthesis.speak(reply);
    }, 10);
  }

  function updateStatus(msg) {
    const statusElement = document.getElementById('statusLabel');
    if(statusElement) statusElement.innerText = msg;
  }

  recognition.onerror = function(event) {
    console.error("인식 에러:", event.error);
    updateStatus("오류 발생: " + event.error);
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
  };
</script>
</body>
</html>
