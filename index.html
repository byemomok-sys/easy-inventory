<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>똑똑한 냉동고 집사</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  
  <style>
    /* 💡 [신규] 꾹 눌렀을 때 국어사전/복사 팝업이 뜨는 것을 원천 차단 */
    * {
      -webkit-touch-callout: none; 
      -webkit-user-select: none; 
      user-select: none; 
    }
    
    body { font-family: 'Noto Sans KR', sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { padding: 20px; text-align: center; background: #1f1f1f; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
    .status { font-size: 0.8rem; color: #ffcc00; margin-top: 5px; font-weight: bold; text-align: center;}
    #chatContainer { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 1rem; line-height: 1.4; word-break: break-word; }
    .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
    .butler { align-self: flex-start; background: #333; color: #e0e0e0; border-bottom-left-radius: 2px; }
    
    .controls { padding: 20px; background: #1f1f1f; display: flex; flex-direction: column; align-items: center; gap: 15px; border-top: 1px solid #333; }
    .btn-row { display: flex; gap: 10px; width: 100%; justify-content: center;}
    .naepa-btn, .inv-btn { background: #333; border: 1px solid #ffcc00; color: #ffcc00; padding: 12px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; flex: 1; max-width: 150px; text-align: center;}
    .inv-btn { border-color: #00e676; color: #00e676; }
    
    #micBtn { width: 80px; height: 80px; border-radius: 50%; border: none; background: #444; color: white; font-size: 2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; }
    #micBtn.listening { background: #ff4444; transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 68, 68, 0.5); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    #startBtn { padding: 20px 40px; font-size: 1.2rem; background: #ffcc00; border:none; border-radius: 50px; font-weight:bold; cursor: pointer; }

    #invModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 2000; flex-direction: column; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #1f1f1f; border-bottom: 1px solid #333; }
    .modal-title { font-size: 1.2rem; font-weight: bold; color: #00e676; }
    .close-btn, .save-btn { background: none; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; padding: 5px; }
    .close-btn { color: #ff4444; }
    .save-btn { color: #007bff; }
    
    .inv-list-container { flex: 1; overflow-y: auto; padding: 0 10px; }
    
    /* 💡 [신규] 플랫(Flat) 리스트 디자인: 박스를 버리고 밀도를 2배 높임 */
    .inv-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 5px; border-bottom: 1px solid #2a2a2a; background: transparent; }
    
    /* 💡 순서 변경 및 이름 영역 */
    .item-left { display: flex; align-items: center; flex: 1; overflow: hidden; }
    .drag-handle { font-size: 1.5rem; color: #666; padding: 0 8px 0 0; cursor: grab; }
    .extreme-sort { display: flex; flex-direction: column; gap: 4px; padding-right: 12px; }
    .extreme-sort button { background: none; border: none; font-size: 0.9rem; padding: 0; color: #888; }
    .item-name { font-weight: bold; font-size: 1.15rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; cursor: pointer; }
    
    /* 💡 수량 조절 및 단위 통합 영역 */
    .item-controls { display: flex; align-items: center; gap: 10px; }
    .qty-btn { width: 35px; height: 35px; border-radius: 6px; border: none; background: #333; color: white; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
    .qty-display { min-width: 40px; text-align: center; font-weight: bold; font-size: 1.2rem; display: flex; align-items: baseline; justify-content: center; }
    .unit-text { font-size: 0.8rem; color: #aaa; margin-left: 2px; font-weight: normal; }
    .del-btn { background: none; border: none; color: #ff4444; font-size: 1.3rem; padding-left: 5px; }
  </style>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://script.googleusercontent.com">
</head>
<body>

  <div id="overlay">
    <button id="startBtn" onclick="callButler()">집사 부르기</button>
  </div>

  <div class="header">
    <div style="font-weight: bold; font-size: 1.2rem;">똑똑한 냉동고 집사</div>
  </div>
  <div class="status" id="statusLabel">대기 중...</div>
  
  <div id="chatContainer"></div>
  
  <div class="controls">
    <div class="btn-row">
      <button class="naepa-btn" onclick="requestNaepa()">✨ 냉파 제안</button>
      <button class="inv-btn" onclick="openInventory()">📋 열어보기</button>
    </div>
    <button id="micBtn" onclick="handleMicClick()">🎤</button>
    <div style="font-size: 0.8rem; color: #666;">마이크를 누르고 말씀하세요</div>
  </div>

  <div id="invModal">
    <div class="modal-header">
      <button class="close-btn" onclick="closeInventory()">취소</button>
      <div class="modal-title">냉동고 전체 재고</div>
      <button class="save-btn" onclick="saveInventory()">저장</button>
    </div>
    <div class="inv-list-container" id="invList">
      </div>
  </div>

<script>
  // ==========================================
  // [설정] 본인의 웹앱 주소 기입
  // ==========================================
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwP5lCFozQRiP7LAHwtkeT104NLzUfPSBwN_v1ZEoOc8hQ2W5lVi97FJ9xVEN79WEoY/exec";
  
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  let isListening = false;
  let finalTranscript = "";      
  let saveTranscript = "";       
  let currentUserBubble = null;
  let requestStartTime = 0; 
  let currentInventoryData = []; 
  let sortableInstance = null; // 드래그 앤 드롭 인스턴스

  recognition.lang = 'ko-KR';
  recognition.continuous = true;    
  recognition.interimResults = true;

  function createChatBubble(text, sender) {
    const container = document.getElementById('chatContainer');
    const bubble = document.createElement('div');
    bubble.classList.add('bubble', sender);
    bubble.innerText = text;
    container.appendChild(bubble);
    container.scrollTop = container.scrollHeight;
    return bubble;
  }

  function callButler() {
    document.getElementById('overlay').style.display = 'none';
    updateStatus("집사가 응답하는 중...");
    setTimeout(() => {
      const greeting = new SpeechSynthesisUtterance("네, 주인님.");
      greeting.lang = "ko-KR";
      window.speechSynthesis.speak(greeting);
    }, 0);
    startListening(); 
  }

  function startListening() {
    if (isListening) return;
    try {
      finalTranscript = "";
      saveTranscript = "";
      currentUserBubble = null;
      recognition.start();
    } catch (e) { setTimeout(() => recognition.start(), 200); }
  }

  recognition.onstart = function() {
    isListening = true;
    updateStatus("🎤 듣고 있습니다...");
    document.getElementById('micBtn').classList.add('listening');
  };

  recognition.onresult = function(event) {
    const isAndroid = /Android/i.test(navigator.userAgent);
    let currentResult = "";
    if (isAndroid) {
      currentResult = event.results[event.results.length - 1][0].transcript;
    } else {
      let speechToText = "";
      for (let i = 0; i < event.results.length; i++) speechToText += event.results[i][0].transcript;
      currentResult = speechToText;
    }
    finalTranscript = currentResult;
    if (!currentUserBubble) currentUserBubble = createChatBubble("", 'user');
    currentUserBubble.innerText = saveTranscript + currentResult;
  };

  recognition.onend = function() {
    if (isListening) {
      if (/Android/i.test(navigator.userAgent)) {
        if (finalTranscript.trim() !== "") { saveTranscript += finalTranscript + " "; finalTranscript = ""; }
        try { recognition.start(); } catch (e) { setTimeout(() => { if (isListening) recognition.start(); }, 200); }
      }
    }
  };

  function handleMicClick() {
    if (isListening) {
      isListening = false;
      recognition.stop();
      document.getElementById('micBtn').classList.remove('listening');
      
      const totalText = currentUserBubble ? currentUserBubble.innerText : (saveTranscript + finalTranscript);
      if (totalText.trim() === "") {
        updateStatus("인식된 내용이 없습니다.");
        if(currentUserBubble) currentUserBubble.remove();
        return;
      }

      requestStartTime = performance.now();
      updateStatus("⌛ 구글 서버와 통신 중...");
      
      fetch(GAS_WEB_APP_URL, {
        method: "POST",
        redirect: "follow", 
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ text: totalText })
      })
      .then(response => response.json())
      .then(data => responseFromGemini(data.response))
      .catch(err => updateStatus("통신 오류가 발생했습니다."));
    } else {
      startListening();
    }
  }

  function requestNaepa() {
    requestStartTime = performance.now();
    updateStatus("⌛ 냉파 제안을 생각하는 중...");
    createChatBubble("✨ 냉파 제안해줘", 'user');
    
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ text: "냉파 제안해줘" })
      })
    .then(response => response.json())
    .then(data => responseFromGemini(data.response))
    .catch(err => updateStatus("통신 오류가 발생했습니다."));
  }

  function responseFromGemini(response) {
    const requestEndTime = performance.now();
    const duration = ((requestEndTime - requestStartTime) / 1000).toFixed(2);
    updateStatus(`✅ 처리 완료: ${duration}초`);
    
    createChatBubble(response, 'butler');
    setTimeout(() => {
      const reply = new SpeechSynthesisUtterance(response);
      reply.lang = "ko-KR";
      reply.rate = 1.1;
      window.speechSynthesis.speak(reply);
    }, 10);
  }

  function updateStatus(msg) {
    const statusElement = document.getElementById('statusLabel');
    if(statusElement) statusElement.innerText = msg;
  }

  // ==================================================
  // 재고관리 UI(모달) 로직
  // ==================================================
  
  function openInventory() {
    document.getElementById('invModal').style.display = 'flex';
    document.getElementById('invList').innerHTML = "<div style='text-align:center; margin-top:50px; color:#aaa;'>데이터를 불러오는 중...</div>";
    
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "getInventory" })
    })
    .then(res => res.json())
    .then(resData => {
      if(resData.status === "success") {
        currentInventoryData = resData.data;
        renderInventoryList();
      }
    })
    .catch(e => {
      document.getElementById('invList').innerHTML = "<div style='color:red; text-align:center;'>통신 실패</div>";
    });
  }

  function closeInventory() {
    document.getElementById('invModal').style.display = 'none';
  }

  function renderInventoryList() {
    const listContainer = document.getElementById('invList');
    listContainer.innerHTML = "";
    
    if(currentInventoryData.length === 0) {
      listContainer.innerHTML = "<div style='text-align:center; color:#888; margin-top:20px;'>냉동고가 비어있습니다.</div>";
      return;
    }

    currentInventoryData.forEach((item, index) => {
      const itemDiv = document.createElement('div');
      itemDiv.className = 'inv-item';
      itemDiv.setAttribute('data-id', index);
      
      itemDiv.innerHTML = `
        <div class="item-left">
          <div class="drag-handle">☰</div>
          <div class="extreme-sort">
            <button onclick="moveToExtreme(${index}, 'top')">⏫</button>
            <button onclick="moveToExtreme(${index}, 'bottom')">⏬</button>
          </div>
          <div class="item-name" onclick="editItemName(${index})">${item.item}</div>
        </div>
        <div class="item-controls">
          <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
          <div class="qty-display">${item.qty}<span class="unit-text">${item.unit}</span></div>
          <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
          <button class="del-btn" onclick="deleteItem(${index})">✕</button>
        </div>
      `;
      listContainer.appendChild(itemDiv);
    });

    // 💡 [신규] SortableJS 드래그 앤 드롭 활성화
    if (sortableInstance) { sortableInstance.destroy(); }
    sortableInstance = new Sortable(listContainer, {
      handle: '.drag-handle', // ☰ 아이콘을 잡았을 때만 드래그 작동 (버튼 클릭 충돌 방지)
      animation: 150,
      onEnd: function (evt) {
        // 드래그가 끝나면 배열 순서를 시각적 순서에 맞게 즉시 동기화
        const movedItem = currentInventoryData.splice(evt.oldIndex, 1)[0];
        currentInventoryData.splice(evt.newIndex, 0, movedItem);
      }
    });
  }

  // 💡 [신규] 품목 이름 수정 프롬프트
  function editItemName(index) {
    const currentName = currentInventoryData[index].item;
    // 브라우저 기본 팝업을 활용하여 아주 가볍고 빠르게 수정
    const newName = prompt("품목의 이름을 수정하세요:", currentName);
    
    if (newName !== null && newName.trim() !== "") {
      currentInventoryData[index].item = newName.trim();
      renderInventoryList();
    }
  }

  // 💡 [신규] 맨 위 / 맨 아래 퀵 이동
  function moveToExtreme(index, position) {
    const movedItem = currentInventoryData.splice(index, 1)[0];
    if(position === 'top') {
      currentInventoryData.unshift(movedItem);
    } else {
      currentInventoryData.push(movedItem);
    }
    renderInventoryList();
  }

  function changeQty(index, delta) {
    let newQty = Number(currentInventoryData[index].qty) + delta;
    if(newQty < 0) newQty = 0;
    currentInventoryData[index].qty = newQty;
    renderInventoryList();
  }

  function deleteItem(index) {
    if(confirm(`'${currentInventoryData[index].item}' 항목을 완전히 삭제하시겠습니까?`)) {
      currentInventoryData.splice(index, 1);
      renderInventoryList();
    }
  }

  function saveInventory() {
    const saveBtn = document.querySelector('.save-btn');
    saveBtn.innerText = "저장중..";
    saveBtn.disabled = true;

    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "saveInventory", data: currentInventoryData })
    })
    .then(res => res.json())
    .then(resData => {
      saveBtn.innerText = "저장";
      saveBtn.disabled = false;
      closeInventory();
      updateStatus("✅ " + resData.message);
    })
    .catch(e => {
      saveBtn.innerText = "저장";
      saveBtn.disabled = false;
      alert("저장 실패");
    });
  }
</script>
</body>
</html>
