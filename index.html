<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>똑똑한 냉동고 집사</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
    input[type="text"] { -webkit-user-select: auto; user-select: auto; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; position: relative; }
    
    /* 💡 버전 태그 v4.7.2 로 업데이트 */
    .version-tag { position: absolute; top: 10px; right: 15px; font-size: 0.9rem; color: #00e676; font-weight: 900; background: #333; padding: 2px 6px; border-radius: 4px;}
    
    .header { padding: 15px; text-align: center; background: #1f1f1f; border-bottom: 1px solid #333; position: relative; }
    .status { font-size: 0.75rem; color: #ffcc00; margin-top: 5px; font-weight: bold; text-align: center;}
    #chatContainer { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
    
    .bubble { max-width: 90%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.3; white-space: pre-wrap; word-break: keep-all; }
    .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
    .butler { align-self: flex-start; background: #333; color: #e0e0e0; border-bottom-left-radius: 2px; }
    
    .menu-chips { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;}
    .menu-chip { background: #1f1f1f; border: 1px solid #0079bf; color: #66b2ff; padding: 10px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; text-align: left; font-weight: bold; width: 100%; word-break: keep-all; touch-action: manipulation; }
    .menu-chip:active { background: #0079bf; color: white; }
    .menu-chip.more { border-color: #ffcc00; color: #ffcc00; text-align: center; margin-top: 5px;}

    .controls { padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); background: #1f1f1f; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #333; }
    .btn-row { display: flex; gap: 8px; justify-content: center;}
    /* 💡 버튼에 cursor: pointer 추가하여 클릭 가능 요소임을 명시 */
    .naepa-btn, .inv-btn { background: #333; border: 1px solid #ffcc00; color: #ffcc00; padding: 10px; border-radius: 12px; font-weight: bold; flex: 1; font-size: 0.9rem; cursor: pointer; touch-action: manipulation;}
    .inv-btn { border-color: #00e676; color: #00e676; }
    .naepa-btn:active, .inv-btn:active { opacity: 0.7; }
    
    .input-row { display: flex; gap: 6px; align-items: center; }
    #micBtn { width: 46px; height: 46px; border-radius: 50%; border: none; background: #444; color: white; font-size: 1.3rem; display: flex; justify-content: center; align-items: center; cursor: pointer; touch-action: manipulation;}
    #micBtn.listening { background: #ff4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    #textInput { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #333; color: white; font-size: 0.95rem; outline: none; }
    #sendBtn { width: 55px; padding: 12px 0; border-radius: 20px; border: none; background: #007bff; color: white; font-size: 0.95rem; font-weight: bold; cursor: pointer; touch-action: manipulation;}

    #mismatchModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; flex-direction: column; justify-content: center; align-items: center; }
    .mismatch-box { background: #1f1f1f; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #444; }
    .mismatch-title { font-size: 1.2rem; color: #ffcc00; margin-bottom: 15px; font-weight: bold; }
    #mismatchText { margin-bottom: 25px; line-height: 1.5; font-size: 1.05rem; }
    .mismatch-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; touch-action: manipulation;}
    #btnOldUnit { background: #007bff; color: white; }
    #btnNewUnit { background: #333; color: white; border: 1px solid #555; }
    .btnCancel { background: none; color: #ff4444; border: none; padding: 10px; font-size: 1rem; margin-top: 5px; cursor: pointer; touch-action: manipulation;}

    #invModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0079bf; z-index: 2000; flex-direction: column; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0, 0, 0, 0.2); }
    .close-btn { color: #ffcccc; background: none; border: none; font-weight: bold; font-size: 1rem; padding: 5px; cursor: pointer; touch-action: manipulation;}
    .save-btn { color: white; background: #28a745; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; touch-action: manipulation;}
    
    .kanban-board { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
    .kanban-row { display: flex; background: rgba(235, 236, 240, 0.95); border-radius: 8px; min-height: 70px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); overflow: hidden; }
    .row-header { width: 70px; min-width: 70px; padding: 8px 4px; font-weight: 800; color: #172b4d; font-size: 0.85rem; border-right: 1px solid #ccc; display: flex; align-items: center; justify-content: center; text-align: center; }
    
    .row-cards { 
      flex: 1; display: flex !important; flex-wrap: nowrap !important; 
      overflow-x: auto !important; overflow-y: hidden !important;
      -webkit-overflow-scrolling: touch; align-items: stretch; gap: 8px; padding: 8px; min-height: 50px; 
    }
    .row-cards::-webkit-scrollbar { display: none; }
    
    .kanban-card { 
      background: white; border-radius: 6px; padding: 6px 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); 
      color: #172b4d; display: flex; flex-direction: column; gap: 6px; 
      flex: 0 0 auto !important; width: 140px !important; border: 1px solid transparent; justify-content: space-between;
    }
    .card-name { font-weight: 700; font-size: 0.8rem; word-break: keep-all; line-height: 1.2; padding-right: 4px; flex: 1; cursor: pointer; touch-action: manipulation;}
    .card-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #eee; padding-top: 4px; }
    
    .drag-handle { color: #999; font-size: 1.3rem; line-height: 1; padding: 0 6px; cursor: grab; display: flex; align-items: center; justify-content: center; margin-top: -2px; touch-action: none;}
    .drag-handle:active { color: #0079bf; cursor: grabbing; }

    .qty-ctrl { display: flex; align-items: center; gap: 1px; }
    .qty-btn { background: #f0f1f4; border: none; border-radius: 4px; width: 22px; height: 22px; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; margin: 0; padding: 0; cursor: pointer; touch-action: manipulation;}
    .qty-display { font-weight: 800; font-size: 0.8rem; min-width: 24px; text-align: center; margin: 0 2px;}
    .unit-text { font-size: 0.65rem; color: #6b778c; }
    .del-btn { color: #de350b; font-size: 1rem; border: none; background: none; padding: 0; margin-left: 5px; cursor: pointer; touch-action: manipulation;}
    .sortable-ghost { opacity: 0.3; border: 2px dashed #0079bf; }
  </style>
</head>
<body>
  <div class="header">
    <div style="font-weight: bold; font-size: 1.1rem;">똑똑한 냉동고 집사</div>
    <div class="version-tag">v4.7.2</div>
    <div class="status" id="statusLabel">집사 대기 중...</div>
  </div>
  <div id="chatContainer"></div>
  <div class="controls">
    <div class="btn-row">
      <button class="naepa-btn" onclick="requestNaepa()">✨ 냉파 제안</button>
      <button class="inv-btn" onclick="openInventory()">📋 냉동고 보기</button>
    </div>
    <div class="input-row">
      <button id="micBtn" onclick="handleMicClick()">🎤</button>
      <input type="text" id="textInput" placeholder="품목 위치와 수량 입력..." onkeypress="handleEnter(event)">
      <button id="sendBtn" onclick="handleTextSubmit()">전송</button>
    </div>
  </div>

  <div id="mismatchModal">
    <div class="mismatch-box">
      <div class="mismatch-title">⚠️ 단위 확인</div>
      <div id="mismatchText"></div>
      <button id="btnOldUnit" class="mismatch-btn"></button>
      <button id="btnNewUnit" class="mismatch-btn"></button>
      <button class="btnCancel" onclick="document.getElementById('mismatchModal').style.display='none'">취소</button>
    </div>
  </div>

  <div id="invModal">
    <div class="modal-header">
      <button class="close-btn" onclick="closeInventory()">취소</button>
      <div style="color:white; font-weight:bold;">냉동고 디지털 트윈</div>
      <button class="save-btn" onclick="saveInventory()">저장</button>
    </div>
    <div class="kanban-board" id="invList"></div>
  </div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwP5lCFozQRiP7LAHwtkeT104NLzUfPSBwN_v1ZEoOc8hQ2W5lVi97FJ9xVEN79WEoY/exec";
  
  let recognition = null;
  let isListening = false; 
  let requestStartTime = 0; 
  let currentInventoryData = [];
  let saveTranscript = "";

  // 💡 [핵심 수정] 음성 인식 기능이 없는 브라우저에서 스크립트가 뻗는 현상 방지
  try {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) {
      recognition = new SpeechRec();
      recognition.lang = 'ko-KR'; 
      recognition.continuous = true; 
      recognition.interimResults = true;
      
      recognition.onstart = () => { isListening = true; document.getElementById('micBtn').classList.add('listening'); document.getElementById('statusLabel').innerText = "🎤 듣고 있습니다..."; };
      recognition.onresult = (e) => {
        let res = ""; for (let i = e.resultIndex; i < e.results.length; i++) res += e.results[i][0].transcript;
        document.getElementById('textInput').value = saveTranscript + res;
      };
      recognition.onend = () => {
        if (isListening && /Android/i.test(navigator.userAgent)) {
          saveTranscript = document.getElementById('textInput').value + " "; 
          try { recognition.start(); } catch (e) { setTimeout(() => { if (isListening) recognition.start(); }, 200); }
        }
      };
    }
  } catch(e) {
    console.error("음성 인식 기능 초기화 실패", e);
  }

  function playTTS(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    let cleanText = text.replace(/[*#\-_]/g, '');
    let utterance = new SpeechSynthesisUtterance(cleanText);
    const voices = window.speechSynthesis.getVoices();
    let maleVoice = voices.find(v => v.lang.includes('ko') && (v.name.includes('Male') || v.name.includes('남성')));
    if(!maleVoice) maleVoice = voices.find(v => v.lang.includes('ko')); 
    
    utterance.voice = maleVoice;
    utterance.pitch = 0.8; 
    utterance.rate = 1.05;
    window.speechSynthesis.speak(utterance);
  }

  function createChatBubble(text, sender, mode = 3, menus = null) {
    const container = document.getElementById('chatContainer'); const bubble = document.createElement('div');
    bubble.classList.add('bubble', sender);
    if (sender === 'butler') {
      const textSpan = document.createElement('span'); textSpan.innerText = text; bubble.appendChild(textSpan);
      if (mode !== 2 && mode !== 1) {
        const spk = document.createElement('span'); spk.innerText = " 🔊"; spk.style.cursor = "pointer";
        spk.onclick = () => playTTS(text); bubble.appendChild(spk);
      }
      if (menus) {
        let chips = document.createElement('div'); chips.className = 'menu-chips';
        menus.forEach(m => {
          let b = document.createElement('button'); b.className = 'menu-chip'; b.innerText = m;
          b.onclick = () => { createChatBubble(m+" 레시피 알려줘", 'user'); playTTS("레시피를 준비하겠습니다."); sendToBackend(m+" 레시피 알려줘"); };
          chips.appendChild(b);
        });
        let more = document.createElement('button'); more.className = 'menu-chip more'; more.innerText = "🔄 다른 메뉴 추천받기";
        more.onclick = () => requestNaepa(); chips.appendChild(more);
        bubble.appendChild(chips);
      }
    } else { bubble.innerText = text; }
    container.appendChild(bubble); container.scrollTop = container.scrollHeight; return bubble;
  }

  function startListening() { 
    if (isListening || !recognition) return; 
    try { 
      saveTranscript = document.getElementById('textInput').value; 
      if(saveTranscript.length > 0 && !saveTranscript.endsWith(' ')) saveTranscript += ' ';
      recognition.start(); 
    } catch (e) { setTimeout(() => recognition.start(), 200); } 
  }

  function handleMicClick() {
    // 마이크 미지원 브라우저 알림
    if (!recognition) {
      alert("현재 사용 중인 인앱 브라우저(카카오톡 등)는 마이크를 지원하지 않습니다.\n안드로이드 '삼성 인터넷'이나 '크롬' 앱으로 열어주세요.");
      return;
    }
    if (isListening) { isListening = false; recognition.stop(); document.getElementById('micBtn').classList.remove('listening'); document.getElementById('statusLabel').innerText = "수정 후 전송 가능"; } 
    else { startListening(); }
  }

  function handleEnter(e) { if(e.key === 'Enter') handleTextSubmit(); }
  function handleTextSubmit() {
    if (isListening && recognition) { isListening = false; recognition.stop(); document.getElementById('micBtn').classList.remove('listening'); }
    const t = document.getElementById('textInput').value; if(!t.trim()) return;
    document.getElementById('textInput').value = ""; createChatBubble(t, 'user'); sendToBackend(t);
  }

  function requestNaepa() { 
    createChatBubble("✨ 냉파 제안해줘", 'user'); 
    playTTS("최적의 메뉴를 엄선 중입니다."); 
    sendToBackend("냉파 제안해줘"); 
  }

  function sendToBackend(t) {
    requestStartTime = performance.now(); document.getElementById('statusLabel').innerText = "⌛ 통신 중...";
    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify({ text: t }) })
    .then(r => r.json()).then(d => {
      if(d.status === "mismatch") { showMismatchModal(d.mismatch, d.parsedData, d.response); return; }
      const dur = ((performance.now() - requestStartTime) / 1000).toFixed(2);
      document.getElementById('statusLabel').innerText = `✅ 완료: ${dur}초`;
      createChatBubble(d.response, 'butler', d.mode, d.menus);
      setTimeout(() => { if (d.mode === 2) playTTS("화면의 상세 정보를 참조해 주세요."); else if (d.mode === 1) playTTS("메뉴를 화면에서 선택해 주세요."); else playTTS(d.response); }, 10);
    }).catch(e => {
      document.getElementById('statusLabel').innerText = "❌ 서버 통신 오류";
      console.error(e);
    });
  }

  let pendingData = []; let pendingAiMessage = ""; let currentMismatch = null;
  function showMismatchModal(mismatch, parsedData, aiMsg) {
    pendingData = parsedData; pendingAiMessage = aiMsg; currentMismatch = mismatch;
    document.getElementById('mismatchText').innerHTML = `<b style="color:#00e676; font-size:1.3rem;">${mismatch.item}</b> 품목이<br>기존에는 <b>'${mismatch.oldUnit}'</b> 단위입니다.<br><br>어떻게 저장할까요?`;
    const btnOld = document.getElementById('btnOldUnit'); btnOld.innerText = `기존 '${mismatch.oldUnit}'(으)로 통합`; btnOld.onclick = () => resolveMismatch(mismatch.oldUnit);
    const btnNew = document.getElementById('btnNewUnit'); btnNew.innerText = `새로운 '${mismatch.newUnit}'(으)로 추가`; btnNew.onclick = () => resolveMismatch(mismatch.newUnit);
    document.getElementById('mismatchModal').style.display = 'flex'; playTTS(`${mismatch.item} 단위가 다릅니다. 선택해주세요.`);
  }

  function resolveMismatch(chosenUnit) {
    document.getElementById('mismatchModal').style.display = 'none'; document.getElementById('statusLabel').innerText = "⌛ 단위를 반영하여 저장 중...";
    pendingData.forEach(item => { if(item.item === currentMismatch.item) item.unit = chosenUnit; });
    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "applyResolved", data: pendingData, aiMessage: pendingAiMessage }) })
    .then(res => res.json()).then(data => {
      document.getElementById('statusLabel').innerText = `✅ 단위 수정 완료`;
      createChatBubble(data.response, 'butler', 3); playTTS(data.response);
    });
  }

  const BASE_LOC_ORDER = ["선반1", "선반2", "선반3", "선반4", "서랍1", "서랍2", "문선반"];
  
  function openInventory() {
    document.getElementById('invModal').style.display = 'flex';
    document.getElementById('invList').innerHTML = "<div style='color:white; padding:20px; text-align:center;'>데이터 로드 중...</div>";
    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "getInventory" }) })
    .then(r => r.json()).then(res => { currentInventoryData = res.data; renderRows(); })
    .catch(e => { document.getElementById('invList').innerHTML = "<div style='color:red; padding:20px;'>데이터 불러오기 실패</div>"; });
  }

  function closeInventory() { document.getElementById('invModal').style.display = 'none'; }

  function renderRows() {
    const board = document.getElementById('invList'); board.innerHTML = "";
    let grouped = {}; currentInventoryData.forEach(item => {
      let l = item.location || "미지정"; if(!grouped[l]) grouped[l] = []; grouped[l].push(item);
    });

    let dynamicLocs = Object.keys(grouped).filter(loc => !BASE_LOC_ORDER.includes(loc) && loc !== "미지정");
    const FINAL_ORDER = [...BASE_LOC_ORDER, ...dynamicLocs, "미지정"];

    FINAL_ORDER.forEach(loc => {
      if(!grouped[loc] && loc === "미지정") return; 
      
      const row = document.createElement('div'); row.className = 'kanban-row'; row.setAttribute('data-loc', loc);
      row.innerHTML = `<div class="row-header">${loc}</div><div class="row-cards" id="row-${loc}"></div>`;
      board.appendChild(row);
      const cardsCont = row.querySelector('.row-cards');
      
      (grouped[loc] || []).forEach(item => {
        const card = document.createElement('div'); card.className = 'kanban-card';
        card.setAttribute('data-name', item.item); card.setAttribute('data-qty', item.qty); card.setAttribute('data-unit', item.unit);
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div class="card-name" onclick="editCardName(this)">${item.item}</div>
            <div class="drag-handle">≡</div>
          </div>
          <div class="card-bottom">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeCardQty(this, -1)">-</button>
              <div class="qty-display">${item.qty}<span class="unit-text">${item.unit}</span></div>
              <button class="qty-btn" onclick="changeCardQty(this, 1)">+</button>
            </div>
            <button class="del-btn" onclick="this.closest('.kanban-card').remove()">✕</button>
          </div>`;
        cardsCont.appendChild(card);
      });
      
      new Sortable(cardsCont, { 
        group: 'fridge', 
        animation: 150, 
        handle: '.drag-handle', 
        filter: '.qty-btn, .del-btn, .card-name', 
        preventOnFilter: false, 
        ghostClass: 'sortable-ghost',
        delay: 50, 
        delayOnTouchOnly: true
      });
    });
  }

  function editCardName(el) {
    let c = el.closest('.kanban-card'); let n = prompt("수정:", c.getAttribute('data-name'));
    if(n && n.trim() !== "") { c.setAttribute('data-name', n.trim()); el.innerText = n.trim(); }
  }
  function changeCardQty(btn, d) {
    let c = btn.closest('.kanban-card'); let q = Math.max(0, Number(c.getAttribute('data-qty')) + d);
    c.setAttribute('data-qty', q); c.querySelector('.qty-display').innerHTML = `${q}<span class="unit-text">${c.getAttribute('data-unit')}</span>`;
    c.style.opacity = (q === 0) ? "0.3" : "1";
  }

  function saveInventory() {
    let data = []; document.querySelectorAll('.kanban-row').forEach(r => {
      let loc = r.getAttribute('data-loc');
      r.querySelectorAll('.kanban-card').forEach(c => {
        data.push({ item: c.getAttribute('data-name'), qty: Number(c.getAttribute('data-qty')), unit: c.getAttribute('data-unit'), location: loc });
      });
    });
    const saveBtn = document.querySelector('.save-btn'); saveBtn.innerText = "저장중.."; saveBtn.disabled = true;
    fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "saveInventory", data: data }) })
    .then(() => { saveBtn.innerText = "저장"; saveBtn.disabled = false; closeInventory(); document.getElementById('statusLabel').innerText = "✅ 변경사항 저장 완료"; })
    .catch(() => { saveBtn.innerText = "저장"; saveBtn.disabled = false; alert("저장 실패"); });
  }
  
  if('speechSynthesis' in window) { window.speechSynthesis.getVoices(); }
</script>
</body>
</html>
